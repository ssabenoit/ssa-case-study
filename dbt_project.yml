name: 'nhl_analytics'
version: '1.0.0'
config-version: 2
# Profile Configuration
profile: 'nhl_analytics'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In dbt, the default materialization for a model is a view. This means, when you run 
# dbt run or dbt build, all of your models will be built as a view in your data platform. 
# The configuration below will override this setting for models in the example folder to 
# instead be materialized as tables. Any models you add to the root of the models folder will 
# continue to be built as views. These settings can be overridden in the individual model files
# using the `{{ config(...) }}` macro.

models:
  nhl_analytics:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    dimensional:
      +materialized: table
    marts:
      # dashboard-serving models re-aggregate on every query as views;
      # small tables are cheaper and faster for Metabase
      +materialized: table

vars:
  regular_season_games: 82
  league_team_count: 32
  league_avg_save_pct: 0.910
  # minimum games played to appear as "qualified" on leaderboards
  leaderboard_min_gp_skater: 10
  leaderboard_min_gp_goalie: 15

# Configure all tests to result in warnings rather than failures
tests:
  +severity: warn
