version: 2

models:
  - name: all_players
    description: Master table of all rostered players for every team (thin rename over int__all_players).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [team_abv, player_id]
    columns:
      - name: player_id
        description: NHL player id
        tests: [not_null]
      - name: team_abv
        description: Roster team abbreviation
        tests: [not_null]
      - name: birth_date
        description: Player date of birth

  - name: all_plays
    description: Passthrough of all staged play-by-play events (one row per game event).
    columns:
      - name: game_id
        tests: [not_null]
      - name: event_id
        tests: [not_null]

  - name: current_statwise_rankings
    description: >
      Team league rankings per stat category for each season, with ordinal
      display strings (1st/2nd/3rd...). Rankings are meaningful again now that
      the underlying special-teams and physical-play stats are populated.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, team_abv]
    columns:
      - name: season
        description: "{{ doc('nhl_season_key') }}"
        tests: [not_null]
      - name: team_abv
        tests: [not_null]

  - name: skaters_season_stats_regular
    description: >
      Regular-season skater stats, one row per season/player/team stint.
      Includes play-by-play-derived detail (real assist splits, GWG/OT/SH/EN
      goals, true faceoff counts), per-game and per-60 rates, and a
      leaderboard qualification flag.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, player_id, team_abv]
    columns:
      - name: season
        description: "{{ doc('nhl_season_key') }}"
        tests: [not_null]
      - name: player_id
        tests: [not_null]
      - name: team_abv
        tests: [not_null]
      - name: name
        description: Player name as it appears in boxscores ("F. Lastname")
      - name: games_played
        tests: [not_null]
      - name: goals
      - name: assists
      - name: points
      - name: game_winning_goals
        description: Real GWG derived from goal sequence vs final scores
      - name: overtime_goals
      - name: sh_goals
      - name: empty_net_goals
      - name: primary_assists
      - name: secondary_assists
      - name: pp_assists
      - name: faceoffs_won
        description: "{{ doc('faceoff_counts') }}"
      - name: faceoffs_lost
      - name: faceoff_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1
              row_condition: "faceoff_pct is not null"
      - name: points_per_game
      - name: points_per_60
        description: Points per 60 minutes of ice time
      - name: is_qualified
        description: Meets the leaderboard minimum games-played threshold
      - name: season_display
        description: Display form of the season ("2025-26")
      - name: headshot_url
        description: Player headshot; falls back to the NHL CDN mug URL

  - name: skaters_season_stats_playoff
    description: Playoff skater stats, one row per season/player/team stint (same construction as regular).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, player_id, team_abv]
    columns:
      - name: season
        tests: [not_null]
      - name: player_id
        tests: [not_null]
      - name: team_abv
        tests: [not_null]

  - name: goalies_season_stats_regular
    description: >
      Regular-season goalie stats, one row per season/goalie/team stint.
      GAA is goals against per 60 minutes of actual ice time; GSAA is saves
      above a league-average goalie on the same shot workload.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, player_id, team_abv]
    columns:
      - name: season
        description: "{{ doc('nhl_season_key') }}"
        tests: [not_null]
      - name: player_id
        tests: [not_null]
      - name: team_abv
        tests: [not_null]
      - name: gp
        tests: [not_null]
      - name: wins
      - name: losses
      - name: ot_losses
      - name: shutouts
      - name: quality_starts
      - name: gaa
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 15
              row_condition: "gaa is not null"
      - name: save_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1
              row_condition: "save_pct is not null"
      - name: goals_saved_above_average
        description: GSAA vs the league_avg_save_pct var
      - name: is_qualified
        description: Meets the leaderboard minimum games-played threshold
      - name: season_display
      - name: headshot_url

  - name: goalies_season_stats_playoff
    description: Playoff goalie stats, one row per season/goalie/team stint.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, player_id, team_abv]
    columns:
      - name: season
        tests: [not_null]
      - name: player_id
        tests: [not_null]

  - name: team_season_stats_regular
    description: >
      Regular-season team stats. Special teams (PP%/PK%), PIM, hits, blocks,
      and giveaways/takeaways are real values assembled from boxscore and
      play-by-play data.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, team_abv]
    columns:
      - name: season
        description: "{{ doc('nhl_season_key') }}"
        tests: [not_null]
      - name: team_abv
        tests: [not_null]
      - name: games_played
        tests: [not_null]
      - name: pp_pct
        description: "Power-play conversion: PP goals / PP opportunities. {{ doc('times_shorthanded') }}"
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1
              row_condition: "pp_pct is not null"
      - name: pk_pct
        description: Penalty-kill success rate
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1
              row_condition: "pk_pct is not null"
      - name: season_display

  - name: team_season_stats_playoff
    description: Playoff team stats (same construction as regular season).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, team_abv]
    columns:
      - name: season
        tests: [not_null]
      - name: team_abv
        tests: [not_null]

  - name: standings_by_day
    description: >
      Gap-filled daily standings (thin view over int__standings_by_day) with
      home/road/L10/streak splits and the display-season string.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, date, team_abv]
    columns:
      - name: season
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: team_abv
        tests: [not_null]
      - name: regulation_plus_ot_wins
        description: True ROW from the league feed
      - name: season_display

  - name: season_dates
    description: First and last standings dates per season.
    columns:
      - name: season
        tests: [unique, not_null]
      - name: start_date
      - name: end_date

  - name: players_history
    description: Every team a player has appeared in a league game for (goalies included).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [player_id, team_abv]
    columns:
      - name: player_id
        tests: [not_null]
      - name: team_abv
        tests: [not_null]

  - name: upcoming_games
    description: >
      Scheduled (FUT/PRE) regular-season and playoff games with team logos.
      Empty during the offseason until the next season's schedule is loaded.
    columns:
      - name: id
        description: NHL game id
        tests: [unique, not_null]
      - name: game_date
      - name: start_time_utc

  - name: mart_team_power_rankings
    description: >
      Presentation passthrough for the Metabase power-rankings card; the
      single source of truth is dimensional/metrics/team_power_rankings.
    columns:
      - name: team_id
        tests: [unique, not_null]
      - name: power_score
        tests: [not_null]
      - name: power_rank
        tests: [unique, not_null]

  - name: mart_standings_weekly
    description: >
      Weekly standings snapshots (Mondays + season final date), sized for the
      2,000-row Metabase public-API cap (~900 rows per season). Feeds the
      bump chart and points-race cards.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, date, team_abv]
    columns:
      - name: season
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: team_abv
        tests: [not_null]
      - name: conference_rank
      - name: league_rank
      - name: is_season_final
      - name: season_display

  - name: mart_team_form
    description: >
      Latest standings snapshot per team per season: record, home/road
      splits, true last-10, streak. Offseason-safe (no current_date lookup).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, team_abv]
    columns:
      - name: season
        tests: [not_null]
      - name: team_abv
        tests: [not_null]
      - name: as_of_date
        tests: [not_null]
      - name: record
      - name: home_record
      - name: road_record
      - name: last_10_record
      - name: streak

  - name: mart_head_to_head
    description: Season series records between every pair of teams that met.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, game_type, team_abv, opponent_abv]
    columns:
      - name: season
        tests: [not_null]
      - name: team_abv
        tests: [not_null]
      - name: opponent_abv
        tests: [not_null]
      - name: record
        description: W-L-OTL vs this opponent

  - name: mart_three_stars
    description: Three Stars of each league game with per-player season selection counts.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [game_id, star_number]
    columns:
      - name: game_id
        tests: [not_null]
      - name: star_number
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3]
      - name: player_id
      - name: star_selections_this_season

  - name: mart_team_shot_metrics
    description: >
      Possession-proxy shot metrics per team-season from play-by-play:
      Corsi (all attempts), Fenwick (unblocked), and PDO. Blocked-shot
      events are attributed to the attempting (opposing) team.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, team_abv]
    columns:
      - name: season
        tests: [not_null]
      - name: team_abv
        tests: [not_null]
      - name: corsi_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1
              row_condition: "corsi_pct is not null"
      - name: fenwick_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1
              row_condition: "fenwick_pct is not null"
      - name: pdo
        description: Shooting% + save% x1000 (league mean ~1000)
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 800
              max_value: 1200
              row_condition: "pdo is not null"
