      - ref('mart_team_form')
      - ref('upcoming_games')
      - ref('standings_by_day')
      - ref('current_statwise_rankings')
      - ref('dim_players')
      - ref('dim_teams')
      - ref('fct_standings_daily')
      - ref('int__teams_basic_info')
      - ref('int__current_standings')
